<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NimbusShare — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#07090f; --surface:#0c0f18; --card:#0f1219;
      --border:rgba(255,255,255,0.06); --border-lit:rgba(255,255,255,0.11);
      --accent:#4f8cff; --accent-dim:rgba(79,140,255,0.13);
      --green:#22c55e; --green-dim:rgba(34,197,94,0.13);
      --red:#ef4444; --red-dim:rgba(239,68,68,0.1);
      --text:#eef0f6; --text-2:#8b93a8; --text-3:#484f61;
      --font-d:'Bebas Neue',sans-serif; --font-b:'DM Sans',sans-serif;
      --font-m:'JetBrains Mono',monospace;
      --r:12px; --r-sm:8px; --ease:cubic-bezier(0.4,0,0.2,1);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-size:15px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden;}

    /* BG */
    .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(79,140,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(79,140,255,0.025) 1px,transparent 1px);background-size:56px 56px;}
    .bg-glow{position:fixed;border-radius:50%;filter:blur(110px);pointer-events:none;z-index:0;}
    .g1{width:600px;height:600px;top:-150px;right:-100px;background:radial-gradient(circle,rgba(79,140,255,0.07) 0%,transparent 70%);}
    .g2{width:400px;height:400px;bottom:-80px;left:-80px;background:radial-gradient(circle,rgba(34,197,94,0.04) 0%,transparent 70%);}

    /* NAV */
    .navbar{position:sticky;top:0;z-index:100;background:rgba(7,9,15,0.88);backdrop-filter:blur(22px);border-bottom:1px solid var(--border);}
    .nav-inner{max-width:1100px;margin:0 auto;padding:0 28px;height:56px;display:flex;align-items:center;gap:16px;}
    .nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--text);}
    .logo-mark{width:30px;height:30px;border-radius:7px;background:var(--accent-dim);border:1px solid rgba(79,140,255,0.2);display:flex;align-items:center;justify-content:center;color:var(--accent);}
    .logo-text{font-family:var(--font-d);font-size:19px;letter-spacing:1px;}
    .nav-back{margin-left:auto;display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:var(--r-sm);background:rgba(255,255,255,0.04);border:1px solid var(--border);color:var(--text-2);font-size:13px;cursor:pointer;text-decoration:none;transition:all .18s var(--ease);}
    .nav-back:hover{background:rgba(255,255,255,0.08);color:var(--text);border-color:var(--border-lit);}

    /* MAIN */
    .main{max-width:1100px;margin:0 auto;padding:40px 28px 80px;position:relative;z-index:1;}

    /* STATES */
    .state-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:80px 20px;text-align:center;}
    .state-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;}
    .state-icon.loading{background:var(--accent-dim);border:1px solid rgba(79,140,255,0.2);color:var(--accent);}
    .state-icon.error{background:var(--red-dim);border:1px solid rgba(239,68,68,0.2);color:var(--red);}
    .state-title{font-size:18px;font-weight:600;}
    .state-sub{font-size:13px;color:var(--text-2);max-width:320px;}
    .spin{width:22px;height:22px;border:2px solid rgba(79,140,255,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* BUNDLE */
    .bundle-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:28px;flex-wrap:wrap;animation:fade-up .5s ease both;}
    .bundle-eyebrow{font-family:var(--font-m);font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;}
    .bundle-title{font-family:var(--font-d);font-size:38px;letter-spacing:1px;margin-bottom:6px;}
    .bundle-meta{font-size:13px;color:var(--text-2);}
    .bundle-dl-all{display:flex;align-items:center;gap:8px;padding:12px 22px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--accent),#6366f1);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font-b);white-space:nowrap;box-shadow:0 4px 20px rgba(79,140,255,0.25);transition:all .2s var(--ease);flex-shrink:0;}
    .bundle-dl-all:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(79,140,255,0.35);}

    /* FILE GRID */
    .file-grid{display:flex;flex-direction:column;gap:10px;}
    .file-row{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:var(--r);background:var(--card);border:1px solid var(--border);cursor:pointer;transition:all .2s var(--ease);animation:fade-up .4s ease both;position:relative;overflow:hidden;}
    .file-row::before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(135deg,rgba(255,255,255,0.018) 0%,transparent 55%);}
    .file-row:hover{border-color:var(--accent);transform:translateX(3px);background:#111520;}
    .file-row:hover .file-row-name{color:var(--accent);}
    .fr-ext{width:44px;height:44px;border-radius:10px;flex-shrink:0;background:var(--accent-dim);border:1px solid rgba(79,140,255,0.18);display:flex;align-items:center;justify-content:center;font-family:var(--font-m);font-size:9px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;}
    .fr-info{flex:1;min-width:0;}
    .file-row-name{display:block;font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;transition:color .18s;}
    .file-row-meta{display:flex;align-items:center;gap:10px;}
    .file-row-size{font-family:var(--font-m);font-size:11px;color:var(--text-3);}
    .file-row-hint{font-size:11px;color:var(--text-3);display:flex;align-items:center;gap:5px;}
    .fr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}
    .fr-copy-btn,.fr-dl-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r-sm);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font-b);transition:all .18s var(--ease);white-space:nowrap;border:1px solid;}
    .fr-copy-btn{background:var(--accent-dim);border-color:rgba(79,140,255,0.22);color:var(--accent);}
    .fr-copy-btn:hover{background:rgba(79,140,255,0.22);border-color:rgba(79,140,255,0.4);}
    .fr-copy-btn.copied{background:var(--green-dim);border-color:rgba(34,197,94,0.25);color:var(--green);}
    .fr-dl-btn{background:var(--green-dim);border-color:rgba(34,197,94,0.22);color:var(--green);}
    .fr-dl-btn:hover{background:rgba(34,197,94,0.22);border-color:rgba(34,197,94,0.4);}

    /* SINGLE FILE */
    .single-wrap{animation:fade-up .5s ease both;}
    .single-header{display:flex;align-items:flex-start;gap:18px;margin-bottom:24px;flex-wrap:wrap;}
    .single-icon{width:58px;height:58px;border-radius:13px;flex-shrink:0;background:var(--accent-dim);border:1px solid rgba(79,140,255,0.2);display:flex;align-items:center;justify-content:center;color:var(--accent);}
    .single-title-group{flex:1;min-width:0;}
    .single-eyebrow{font-family:var(--font-m);font-size:10px;letter-spacing:2px;color:var(--text-3);text-transform:uppercase;margin-bottom:6px;}
    .single-name{font-size:22px;font-weight:700;color:var(--text);word-break:break-word;margin-bottom:6px;line-height:1.3;}
    .single-meta{font-size:13px;color:var(--text-2);}
    .single-actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:22px;}
    .dl-btn-main{display:flex;align-items:center;gap:9px;padding:13px 26px;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--green),#16a34a);border:none;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-b);box-shadow:0 4px 20px rgba(34,197,94,0.22);transition:all .2s var(--ease);}
    .dl-btn-main:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(34,197,94,0.32);}
    .copy-link-btn{display:flex;align-items:center;gap:8px;padding:13px 20px;border-radius:var(--r-sm);background:var(--accent-dim);border:1px solid rgba(79,140,255,0.22);color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font-b);transition:all .2s var(--ease);}
    .copy-link-btn:hover{background:rgba(79,140,255,0.2);border-color:rgba(79,140,255,0.4);}
    .copy-link-btn.copied{background:var(--green-dim);border-color:rgba(34,197,94,0.25);color:var(--green);}

    /* PREVIEW PANE */
    .preview-pane{border-radius:var(--r);border:1px solid var(--border);background:var(--card);overflow:hidden;min-height:280px;}
    .preview-pane iframe,.preview-pane img,.preview-pane video,.preview-pane audio{display:block;width:100%;border:none;}
    .preview-pane img{max-height:72vh;object-fit:contain;background:#000;}
    .preview-pane video{max-height:72vh;background:#000;}
    .preview-pane audio{padding:28px;width:100%;}
    .preview-pane iframe{height:72vh;}

    /* text preview */
    .text-preview{padding:24px;font-family:var(--font-m);font-size:13px;color:var(--text-2);line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:72vh;overflow-y:auto;}
    .text-preview::-webkit-scrollbar{width:5px;}
    .text-preview::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:3px;}

    /* no preview */
    .no-preview{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 28px;text-align:center;}
    .no-preview-icon{width:60px;height:60px;border-radius:14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-3);}
    .no-preview-title{font-size:16px;font-weight:600;color:var(--text);}
    .no-preview-sub{font-size:13px;color:var(--text-3);}

    /* inline preview panel */
    .inline-preview-panel{margin-top:10px;border-radius:var(--r);border:1px solid var(--accent);background:var(--card);overflow:hidden;animation:panel-in .3s cubic-bezier(0.34,1.2,0.64,1) both;}
    @keyframes panel-in{from{opacity:0;transform:scaleY(.95);transform-origin:top}to{opacity:1;transform:scaleY(1)}}
    .inline-preview-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);}
    .inline-preview-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:1;}
    .inline-close{background:none;border:none;cursor:pointer;color:var(--text-3);font-size:18px;padding:0 4px;transition:color .15s;flex-shrink:0;margin-left:12px;}
    .inline-close:hover{color:var(--text);}
    .inline-preview-body iframe,.inline-preview-body img,.inline-preview-body video,.inline-preview-body audio{display:block;width:100%;border:none;}
    .inline-preview-body img{max-height:55vh;object-fit:contain;background:#000;}
    .inline-preview-body video{max-height:55vh;background:#000;}
    .inline-preview-body iframe{height:55vh;}
    .inline-preview-body audio{padding:20px;}
    .inline-preview-body .text-preview{max-height:55vh;}

    /* TOAST */
    .ns-toast{position:fixed;top:68px;right:20px;z-index:9999;display:flex;align-items:flex-start;gap:10px;padding:12px 15px;border-radius:9px;max-width:320px;font-family:var(--font-b);font-size:13px;line-height:1.5;box-shadow:0 8px 30px rgba(0,0,0,0.4);backdrop-filter:blur(12px);animation:toast-in .3s cubic-bezier(0.34,1.56,0.64,1) forwards;}
    @keyframes toast-in{from{opacity:0;transform:translateX(16px) scale(.96)}to{opacity:1;transform:none}}
    @keyframes toast-out{from{opacity:1}to{opacity:0;transform:translateX(16px)}}

    @keyframes fade-up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    :focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:4px;}
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-thumb{background:var(--border-lit);border-radius:3px;}

    @media(max-width:640px){
      .main{padding:24px 16px 60px;}
      .bundle-header{flex-direction:column;gap:14px;}
      .fr-actions{flex-direction:column;gap:6px;width:100%;}
      .fr-copy-btn,.fr-dl-btn{justify-content:center;}
      .single-actions{flex-direction:column;}
      .dl-btn-main,.copy-link-btn{justify-content:center;}
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow g1"></div>
  <div class="bg-glow g2"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="index.html">
        <div class="logo-mark">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">NimbusShare</span>
      </a>
      <a class="nav-back" href="index.html">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Upload Files
      </a>
    </div>
  </nav>

  <main class="main" id="main">
    <div class="state-center" id="loadingState">
      <div class="state-icon loading"><div class="spin"></div></div>
      <p class="state-title">Loading...</p>
      <p class="state-sub">Fetching your file from the cloud</p>
    </div>
  </main>

<script>
const API_BASE = "https://svzju8smoa.execute-api.ap-south-1.amazonaws.com/prod/upload";
const mainEl   = document.getElementById("main");

function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function formatSize(b){if(!b)return"—";if(b<1024)return b+" B";if(b<1048576)return(b/1024).toFixed(1)+" KB";return(b/1048576).toFixed(2)+" MB";}
function getExt(n){if(!n)return"FILE";const p=n.split(".");return p.length>=2?p[p.length-1].toUpperCase():"FILE";}
function isImage(n){return/\.(jpg|jpeg|png|gif|webp|svg)$/i.test(n);}
function isVideo(n){return/\.(mp4|webm|ogg|mov)$/i.test(n);}
function isAudio(n){return/\.(mp3|wav|ogg|aac|flac)$/i.test(n);}
function isPdf(n)  {return/\.pdf$/i.test(n);}
function isText(n) {return/\.(txt|md|csv|json|js|ts|html|css|xml|log|sh|py|java|c|cpp|h|yaml|yml|ini|toml)$/i.test(n);}
function canPreview(n){return isImage(n)||isVideo(n)||isAudio(n)||isPdf(n)||isText(n);}

function toast(msg,type="info"){
  document.querySelectorAll(".ns-toast").forEach(t=>t.remove());
  const cols={success:{bg:"#0a180d",bdr:"rgba(34,197,94,.32)",tx:"#86efac"},error:{bg:"#1a0a0a",bdr:"rgba(239,68,68,.32)",tx:"#fca5a5"},info:{bg:"#0a0e1a",bdr:"rgba(79,140,255,.32)",tx:"#93c5fd"}};
  const c=cols[type]||cols.info;
  const el=document.createElement("div");
  el.className="ns-toast";
  el.style.cssText=`background:${c.bg};border:1px solid ${c.bdr};color:${c.tx}`;
  el.innerHTML=`<span style="flex:1">${msg}</span><button onclick="this.parentElement.remove()" style="background:none;border:none;cursor:pointer;color:${c.tx};opacity:.5;font-size:16px;padding:0;margin-left:8px">×</button>`;
  document.body.appendChild(el);
  setTimeout(()=>{if(!el.parentElement)return;el.style.animation="toast-out .25s ease forwards";setTimeout(()=>el.remove(),260);},4000);
}

function copyUrl(url,btn){
  navigator.clipboard.writeText(url).then(()=>{
    const orig=btn.innerHTML;
    btn.classList.add("copied");
    btn.innerHTML=`<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied!`;
    toast("Link copied!","success");
    setTimeout(()=>{btn.classList.remove("copied");btn.innerHTML=orig;},2200);
  }).catch(()=>toast("Could not copy.","error"));
}

function downloadFile(url,name){
  const a=document.createElement("a");
  a.href=url;a.download=name||"download";a.target="_blank";a.rel="noopener";
  document.body.appendChild(a);a.click();setTimeout(()=>a.remove(),100);
  toast(`Downloading "${name}"...`,"info");
}

function buildPreviewEl(url,name){
  if(isImage(name)){const i=document.createElement("img");i.src=url;i.alt=name;i.onerror=()=>i.replaceWith(noPreviewEl(name));return i;}
  if(isVideo(name)){const v=document.createElement("video");v.src=url;v.controls=true;v.preload="metadata";return v;}
  if(isAudio(name)){const a=document.createElement("audio");a.src=url;a.controls=true;a.preload="metadata";return a;}
  if(isPdf(name)){const f=document.createElement("iframe");f.src=url+"#toolbar=1&navpanes=0";f.title=name;return f;}
  if(isText(name)){const d=document.createElement("div");d.className="text-preview";d.textContent="Loading...";fetch(url).then(r=>r.text()).then(t=>{d.textContent=t;}).catch(()=>{d.textContent="Could not load text.";});return d;}
  return null;
}

function noPreviewEl(name){
  const d=document.createElement("div");d.className="no-preview";
  d.innerHTML=`<div class="no-preview-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z" stroke="currentColor" stroke-width="1.5"/><polyline points="13 2 13 9 20 9" stroke="currentColor" stroke-width="1.5"/></svg></div><p class="no-preview-title">Preview not available</p><p class="no-preview-sub">.${getExt(name).toLowerCase()} files can't be previewed in the browser. Use Download to open.</p>`;
  return d;
}

function showError(title,sub){
  mainEl.innerHTML=`<div class="state-center"><div class="state-icon error"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="8" x2="12" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="16" x2="12.01" y2="16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div><p class="state-title">${escH(title)}</p><p class="state-sub">${escH(sub)}</p><a href="index.html" style="margin-top:8px;color:var(--accent);font-size:13px;text-decoration:underline;text-underline-offset:3px">← Go back to upload</a></div>`;
}

/* ── SINGLE FILE RENDER ─────────────────────────── */
function renderSingle(fileUrl,fileName,fileSize){
  const name=fileName||decodeURIComponent(fileUrl.split("/").pop().split("?")[0])||"file";
  const sizeStr=fileSize?formatSize(fileSize):"";
  const ext=getExt(name);
  const pageUrl=window.location.href;
  document.title=`NimbusShare — ${name}`;

  const wrap=document.createElement("div");
  wrap.className="single-wrap";

  // header
  const hdr=document.createElement("div");hdr.className="single-header";
  hdr.innerHTML=`
    <div class="single-icon">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <path d="M13 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V9z" stroke="currentColor" stroke-width="1.5"/>
        <polyline points="13 2 13 9 20 9" stroke="currentColor" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="single-title-group">
      <p class="single-eyebrow">NimbusShare · Shared File</p>
      <h1 class="single-name">${escH(name)}</h1>
      <p class="single-meta">${sizeStr?sizeStr+" · ":""}${ext} file${canPreview(name)?" · Preview available":""}</p>
    </div>`;
  wrap.appendChild(hdr);

  // actions
  const acts=document.createElement("div");acts.className="single-actions";
  const dlBtn=document.createElement("button");dlBtn.className="dl-btn-main";
  dlBtn.innerHTML=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Download File`;
  dlBtn.addEventListener("click",()=>downloadFile(fileUrl,name));
  acts.appendChild(dlBtn);

  const cpBtn=document.createElement("button");cpBtn.className="copy-link-btn";
  const cpOrig=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.5"/></svg> Copy Link`;
  cpBtn.innerHTML=cpOrig;
  cpBtn.addEventListener("click",()=>copyUrl(pageUrl,cpBtn));
  acts.appendChild(cpBtn);
  wrap.appendChild(acts);

  // preview
  const pane=document.createElement("div");pane.className="preview-pane";
  const prev=buildPreviewEl(fileUrl,name);
  pane.appendChild(prev||noPreviewEl(name));
  wrap.appendChild(pane);

  mainEl.innerHTML="";mainEl.appendChild(wrap);
}

/* ── BUNDLE RENDER ──────────────────────────────── */
function renderBundle(data){
  const {bundle_id,total_files,files}=data;
  const totalSize=files.reduce((s,f)=>s+(f.file_size||0),0);
  document.title=`NimbusShare — Bundle (${total_files} files)`;

  const wrap=document.createElement("div");

  // header
  const hdr=document.createElement("div");hdr.className="bundle-header";
  const titleGrp=document.createElement("div");
  titleGrp.innerHTML=`<p class="bundle-eyebrow">NimbusShare · Shared Bundle</p><h1 class="bundle-title">File Bundle</h1><p class="bundle-meta">${total_files} file${total_files!==1?"s":""} · ${formatSize(totalSize)} total</p>`;
  hdr.appendChild(titleGrp);

  const dlAll=document.createElement("button");dlAll.className="bundle-dl-all";
  dlAll.innerHTML=`<svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Download All`;
  dlAll.addEventListener("click",()=>{files.forEach((f,i)=>setTimeout(()=>downloadFile(f.download_url,f.file_name),i*400));});
  hdr.appendChild(dlAll);
  wrap.appendChild(hdr);

  // file grid
  const grid=document.createElement("div");grid.className="file-grid";
  let openRow=null,openPanel=null;

  files.forEach((f,idx)=>{
    const name=f.file_name;
    const dlUrl=f.download_url;
    const ext=getExt(name);
    const prev=canPreview(name);
    const filePageUrl=`${window.location.href.split("?")[0]}?f=${encodeURIComponent(dlUrl)}`;

    const row=document.createElement("div");
    row.className="file-row";
    row.style.animationDelay=(idx*0.06)+"s";
    row.innerHTML=`
      <div class="fr-ext">${escH(ext)}</div>
      <div class="fr-info">
        <span class="file-row-name">${escH(name)}</span>
        <div class="file-row-meta">
          <span class="file-row-size">${formatSize(f.file_size)}</span>
          <span class="file-row-hint">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none">
              ${prev
                ?`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="1.5"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>`
                :`<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="1" y1="1" x2="23" y2="23" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>`
              }
            </svg>
            ${prev?"Click to preview":"No preview"}
          </span>
        </div>
      </div>
      <div class="fr-actions">
        <button class="fr-copy-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          Copy Link
        </button>
        <button class="fr-dl-btn">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <polyline points="7 10 12 15 17 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <line x1="12" y1="15" x2="12" y2="3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Download
        </button>
      </div>`;

    // copy link
    row.querySelector(".fr-copy-btn").addEventListener("click",(e)=>{e.stopPropagation();copyUrl(filePageUrl,row.querySelector(".fr-copy-btn"));});
    // download
    row.querySelector(".fr-dl-btn").addEventListener("click",(e)=>{e.stopPropagation();downloadFile(dlUrl,name);});

    // click row → inline preview
    row.addEventListener("click",(e)=>{
      if(e.target.closest(".fr-copy-btn")||e.target.closest(".fr-dl-btn"))return;
      if(!prev){toast(`Can't preview .${ext.toLowerCase()} files — use Download.`,"info");return;}

      // toggle off if same row
      if(openRow===row&&openPanel){openPanel.remove();openRow=null;openPanel=null;return;}
      // close previous
      if(openPanel){openPanel.remove();openRow=null;openPanel=null;}

      const panel=document.createElement("div");panel.className="inline-preview-panel";
      panel.innerHTML=`<div class="inline-preview-header"><span class="inline-preview-title">${escH(name)}</span><button class="inline-close" title="Close">×</button></div><div class="inline-preview-body" id="ipb${idx}"></div>`;
      panel.querySelector(".inline-close").addEventListener("click",(e)=>{e.stopPropagation();panel.remove();openRow=null;openPanel=null;});
      const body=panel.querySelector(`#ipb${idx}`);
      const el=buildPreviewEl(dlUrl,name);
      if(el)body.appendChild(el);

      row.insertAdjacentElement("afterend",panel);
      openRow=row;openPanel=panel;
      panel.scrollIntoView({behavior:"smooth",block:"nearest"});
    });

    grid.appendChild(row);
  });

  wrap.appendChild(grid);
  mainEl.innerHTML="";mainEl.appendChild(wrap);
}

/* ── INIT ───────────────────────────────────────── */
(async function(){
  const params=new URLSearchParams(window.location.search);
  const bundleId=params.get("bundle_id");
  const fileUrl=params.get("f");

  if(bundleId){
    try{
      const res=await fetch(`${API_BASE}?bundle_id=${encodeURIComponent(bundleId)}`);
      if(!res.ok)throw new Error(`Server returned ${res.status}`);
      const data=await res.json();
      if(!data.files||data.files.length===0)throw new Error("No files found in this bundle.");
      renderBundle(data);
    }catch(err){
      showError("Bundle not found",err.message||"This link may be invalid or files may have been deleted.");
    }
    return;
  }

  if(fileUrl){
    const decoded=decodeURIComponent(fileUrl);
    const name=decodeURIComponent(decoded.split("/").pop().split("?")[0])||"file";
    renderSingle(decoded,name,null);
    return;
  }

  showError("No file specified","This link doesn't point to any file. Ask the sender to share a valid NimbusShare link.");
})();
</script>
